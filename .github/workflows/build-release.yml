name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Executable
        run: |
          npm run build:win

      - name: Prepare Releases Branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          $branchName = "releases"
          
          if (git ls-remote --heads origin $branchName) {
              git fetch origin $branchName
              git worktree add releases origin/$branchName
          } else {
              mkdir releases
          }
          
          Copy-Item -Path build/activiti-tools.exe -Destination releases/ -Force

      - name: Push to Releases Branch
        uses: ad-m/github-push-action@master
        with:
          branch: releases
          directory: releases
          github_token: ${{ secrets.GITHUB_TOKEN }}
          force: true
          message: "Update release binary ${{ github.ref_name }}"
