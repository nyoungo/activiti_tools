name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Executable
        run: |
          npm run build:win

      - name: Configure Git and Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          $token = "${{ secrets.GITHUB_TOKEN }}"
          $repo = "${{ github.repository }}"
          $remoteUrl = "https://x-access-token:$token@github.com/$repo.git"
          
          git checkout --orphan releases
          git rm -rf .
          
          Copy-Item build/activiti-tools.exe .
          git add activiti-tools.exe
          git commit -m "Update release binary ${{ github.ref_name }}"
          git push -f $remoteUrl releases
