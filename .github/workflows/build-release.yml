name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Executable
        run: |
          npm run build:win

      - name: Push to Releases Branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          $branchName = "releases"
          
          if (git ls-remote --heads origin $branchName) {
              git fetch origin $branchName
              git checkout -b $branchName origin/$branchName
          } else {
              git checkout --orphan $branchName
              git rm -rf .
          }
          
          Copy-Item -Path build/activiti-tools.exe -Destination . -Force
          
          git add activiti-tools.exe
          git commit -m "Update release binary ${{ github.ref_name }}"
          git push origin $branchName
