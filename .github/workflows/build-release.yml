name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Executable
        run: |
          npm run build:win

      - name: Create and Push Releases Branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $repoUrl = "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          mkdir temp-releases
          cd temp-releases
          
          git init
          Copy-Item -Path ../build/activiti-tools.exe -Destination . -Force
          git add activiti-tools.exe
          git commit -m "Update release binary ${{ github.ref_name }}"
          git branch -M releases
          git push -f $repoUrl releases
