<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activiti 工作流维护工具</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- 主内容区 -->
        <main class="main-content-full">
            <!-- 数据库连接页面（初始页面） -->
            <section id="page-connection" class="page active">
                <div class="page-header">
                    <h2>数据库连接</h2>
                </div>
                <div class="content-box">
                    <div class="connection-form">
                        <div class="form-group">
                            <label>已保存的配置</label>
                            <select id="savedConnections">
                                <option value="">-- 选择配置 --</option>
                            </select>
                            <button id="deleteConnection" class="btn btn-danger btn-small" style="display:none;">删除</button>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>连接名称</label>
                                <input type="text" id="connName" placeholder="我的数据库">
                            </div>
                            <div class="form-group">
                                <label>数据库类型</label>
                                <select id="connType">
                                <option value="mysql">MySQL</option>
                                <option value="postgres">PostgreSQL</option>
                                <option value="hgdatabase">瀚高数据库</option>
                            </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>主机</label>
                                <input type="text" id="connHost" placeholder="localhost">
                            </div>
                            <div class="form-group">
                                <label>端口</label>
                                <input type="number" id="connPort" placeholder="3306">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>数据库名</label>
                                <input type="text" id="connDatabase" placeholder="activiti">
                            </div>
                            <div class="form-group">
                                <label>模式名（PostgreSQL/瀚高）</label>
                                <input type="text" id="connSchema" placeholder="public">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>用户名</label>
                                <input type="text" id="connUsername" placeholder="root">
                            </div>
                            <div class="form-group">
                                <label>密码</label>
                                <input type="password" id="connPassword" placeholder="password">
                            </div>
                        </div>
                        <div class="button-group">
                            <button id="testConnection" class="btn btn-secondary">测试连接</button>
                            <button id="saveConnection" class="btn btn-secondary">保存配置</button>
                            <button id="connect" class="btn btn-primary">连接</button>
                        </div>
                        <div id="connectionMessage" class="message"></div>
                    </div>
                </div>
            </section>

            <!-- 流程实例页面 -->
            <section id="page-instances" class="page">
                <div class="page-header">
                    <h2>流程实例管理</h2>
                    <div class="header-right">
                        <div class="connection-status-simple">
                            <span class="status-dot"></span>
                            <span id="statusText">未连接</span>
                            <button id="disconnect" class="btn btn-small btn-danger" style="display:none; margin-left: 10px;">断开连接</button>
                        </div>
                        <div class="search-box">
                            <input type="text" id="searchKeyword" placeholder="搜索流程名称、Key或业务Key...">
                            <button id="searchBtn" class="btn btn-primary">搜索</button>
                        </div>
                    </div>
                </div>

                <!-- 流程实例标签页 -->
                <div class="tabs">
                    <button class="tab-btn active" data-tab="running">运行中</button>
                    <button class="tab-btn" data-tab="finished">已结束</button>
                </div>

                <div class="content-box">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>实例ID</th>
                                <th>流程名称</th>
                                <th>业务Key</th>
                                <th>发起人</th>
                                <th>开始时间</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="instancesTableBody">
                            <tr><td colspan="7" class="text-center">请连接数据库</td></tr>
                        </tbody>
                    </table>
                    <div class="pagination" id="pagination"></div>
                </div>
            </section>
        </main>
    </div>

    <!-- 流程实例详情模态框 -->
    <div id="instanceModal" class="modal">
        <div class="modal-content modal-large" style="max-width: 95vw; max-height: 95vh;">
            <div class="modal-header">
                <h3>流程实例详情</h3>
                <button class="modal-close" onclick="closeInstanceModal()">&times;</button>
            </div>
            <div class="modal-body" id="instanceModalBody"></div>
        </div>
    </div>

    <!-- 设置审批人模态框 -->
    <div id="assigneeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>任务审批人设置</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>任务ID</label>
                    <input type="text" id="assigneeTaskId" readonly>
                </div>
                <div class="form-group">
                    <label>任务名称</label>
                    <input type="text" id="assigneeTaskName" readonly>
                </div>
                <div class="form-group">
                    <label>当前审批人</label>
                    <input type="text" id="currentAssignee" readonly>
                </div>
                <div class="form-group">
                    <label>设置审批人</label>
                    <input type="text" id="newAssignee" placeholder="输入用户ID">
                    <small>设置单个审批人，将替换当前审批人</small>
                </div>
                <div class="form-group">
                    <label>添加候选人</label>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <input type="text" id="candidateUserId" placeholder="输入用户ID" style="flex: 3; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                        <select id="candidateType" style="flex: 2; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                            <option value="candidate">候选人</option>
                            <option value="assignee">审批人</option>
                        </select>
                        <button class="btn btn-small btn-secondary" onclick="addCandidate()" style="flex: 1;">添加</button>
                    </div>
                    <small>添加多审批人（IdentityLink）</small>
                </div>
                <div class="form-group">
                    <label>当前候选人/审批人</label>
                    <div id="identityLinkList" style="max-height: 200px; overflow-y: auto;"></div>
                </div>
                <div class="button-group">
                    <button class="btn btn-primary" onclick="saveAssignee()">保存审批人</button>
                    <button class="btn btn-secondary" onclick="refreshTaskInfo()">刷新</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 流程定义XML模态框 -->
    <div id="xmlModal" class="modal">
        <div class="modal-content modal-large" style="max-width: 95vw; max-height: 95vh;">
            <div class="modal-header">
                <h3>流程定义 XML</h3>
                <button class="modal-close" onclick="closeXmlModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="affectedInstancesInfo" style="display: none; margin-bottom: 12px;"></div>
                <textarea id="xmlContent" readonly style="min-height: 500px;"></textarea>
                <div id="xmlActions" style="margin-top: 12px; display: none;">
                    <button class="btn btn-primary" onclick="saveXml()">保存修改</button>
                    <button class="btn btn-secondary" onclick="resetXml()">重置</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
