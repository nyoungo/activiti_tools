<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activiti 工作流维护工具</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- 主内容区 -->
        <main class="main-content-full">
            <!-- 数据库连接页面（初始页面） -->
            <section id="page-connection" class="page active">
                <div class="page-header">
                    <h2>数据库连接</h2>
                </div>
                <div class="content-box">
                    <div class="connection-form">
                        <div class="form-group">
                            <label>已保存的配置</label>
                            <div style="display: flex; gap: 12px; align-items: center;">
                                <select id="savedConnections" style="flex: 1;">
                                    <option value="">-- 选择配置 --</option>
                                </select>
                                <button id="deleteConnection" class="btn btn-danger btn-small" style="display:none; flex-shrink: 0;">删除</button>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>连接名称</label>
                                <input type="text" id="connName" placeholder="我的数据库">
                            </div>
                            <div class="form-group">
                                <label>数据库类型</label>
                                <select id="connType">
                                <option value="mysql">MySQL</option>
                                <option value="postgres">PostgreSQL</option>
                                <option value="hgdatabase">瀚高数据库</option>
                            </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>主机</label>
                                <input type="text" id="connHost" placeholder="localhost">
                            </div>
                            <div class="form-group">
                                <label>端口</label>
                                <input type="number" id="connPort" placeholder="3306">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>用户名</label>
                                <input type="text" id="connUser" placeholder="root">
                            </div>
                            <div class="form-group">
                                <label>密码</label>
                                <input type="password" id="connPass" placeholder="密码">
                            </div>
                        </div>
                        <div class="form-group" id="dbNameGroup">
                            <label>数据库名称</label>
                            <input type="text" id="connDbName" placeholder="activiti">
                        </div>
                        <div class="form-group" id="schemaGroup" style="display: none;">
                            <label>Schema</label>
                            <select id="connSchema">
                                <option value="">-- 选择 Schema --</option>
                            </select>
                        </div>
                        <div class="button-group">
                            <button class="btn btn-secondary" onclick="testConnection()">测试连接</button>
                            <button class="btn btn-primary" onclick="connectDatabase()">连接</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 工作空间页面 -->
            <section id="page-workspace" class="page">
                <div class="page-header">
                    <h2>Activiti工作流维护工具</h2>
                    <div class="header-right">
                        <button class="btn btn-secondary btn-small" onclick="switchConnection()">切换数据库</button>
                    </div>
                </div>
                
                <!-- 标签页导航 -->
                <div class="tabs">
                    <button class="tab-btn active" data-tab="tab-instances">流程实例</button>
                    <button class="tab-btn" data-tab="tab-definitions">流程定义</button>
                </div>
                
                <!-- 流程实例标签页 -->
                <div id="tab-instances" class="tab-content active">
                    <div class="tab-header">
                        <div class="tab-filters">
                            <select id="instanceFilter" onchange="loadInstances()">
                                <option value="running">运行中</option>
                                <option value="finished">已结束</option>
                                <option value="all">全部</option>
                            </select>
                        </div>
                    </div>
                    <div id="instancesList" class="table-container"></div>
                    <div id="instancesPagination" class="pagination"></div>
                </div>
                
                <!-- 流程定义标签页 -->
                <div id="tab-definitions" class="tab-content">
                    <div class="tab-header">
                        <div class="tab-filters">
                            <input type="text" id="definitionSearch" placeholder="搜索流程定义..." onkeyup="loadDefinitions()">
                        </div>
                    </div>
                    <div id="definitionsList" class="table-container"></div>
                    <div id="definitionsPagination" class="pagination"></div>
                </div>
            </section>
        </main>
    </div>

    <!-- 流程实例详情模态框 -->
    <div id="instanceDetailModal" class="modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3>流程实例详情</h3>
                <button class="modal-close" onclick="closeInstanceDetail()">&times;</button>
            </div>
            <div class="modal-body" id="instanceDetailContent"></div>
        </div>
    </div>

    <!-- 流程变量模态框 -->
    <div id="variablesModal" class="modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3>流程变量</h3>
                <button class="modal-close" onclick="closeVariablesModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="variablesList" class="table-container"></div>
            </div>
        </div>
    </div>

    <!-- 流程定义XML模态框 -->
    <div id="xmlModal" class="modal">
        <div class="modal-content modal-large" style="max-width: 95vw; max-height: 95vh;">
            <div class="modal-header">
                <h3>流程定义 XML</h3>
                <button class="modal-close" onclick="closeXmlModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="affectedInstancesInfo" style="display: none; margin-bottom: 12px;"></div>
                <textarea id="xmlContent" readonly style="min-height: 500px;"></textarea>
                <div id="xmlActions" style="margin-top: 12px; display: none;">
                    <button class="btn btn-primary" onclick="saveXml()">保存修改</button>
                    <button class="btn btn-secondary" onclick="resetXml()">重置</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑历史任务模态框 -->
    <div id="editHistoryTaskModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>编辑历史审批记录</h3>
                <button class="modal-close" onclick="closeEditHistoryTaskModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>任务名称</label>
                    <input type="text" id="editHistoryTaskName">
                </div>
                <div class="form-group">
                    <label>审批人</label>
                    <div class="user-selector">
                        <input type="text" id="editHistoryAssignee" placeholder="搜索或选择用户..." onkeyup="searchUsers(this)">
                        <div class="user-dropdown" style="display: none;"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label>审批时间</label>
                    <input type="datetime-local" id="editHistoryEndTime">
                </div>
                <div class="button-group">
                    <button class="btn btn-primary" onclick="saveHistoryTaskEdit()">保存修改</button>
                    <button class="btn btn-secondary" onclick="closeEditHistoryTaskModal()">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    
    <!-- 版权信息 -->
    <footer class="footer">
        <p>© 2026 Nyoung. All rights reserved.</p>
    </footer>
</body>
</html>
